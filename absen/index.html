<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ABSEN SELFIE TKJ</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#eef5ee;
padding:20px;
}

video,canvas{
width:90%;
max-width:350px;
border-radius:10px;
margin:10px;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:12px;
margin:10px;
border-radius:6px;
width:200px;
}

input,select{
padding:10px;
width:220px;
margin:8px;
}

</style>

</head>

<body>

<h2>📸 ABSEN SELFIE TKJ</h2>

<input id="nama" placeholder="Nama"><br>

<select id="kelas">
<option value="">Pilih Kelas</option>
<option>X TKJ</option>
<option>XI TKJ</option>
<option>XII TKJ</option>
</select>

<br>

<video id="kamera" autoplay></video>
<br>

<button onclick="foto()">Ambil Foto</button>

<canvas id="canvas" style="display:none"></canvas>

<br>

<button onclick="kirim()">Kirim Absen</button>

<script>

let video=document.getElementById("kamera")

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject=stream
})

function foto(){

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0)

canvas.style.display="block"

}

function kirim(){

let canvas=document.getElementById("canvas")

let foto=canvas.toDataURL("image/png")

fetch("URL_SCRIPT_APPS_SCRIPT",{

method:"POST",

body:JSON.stringify({
nama:nama.value,
kelas:kelas.value,
foto:foto
})

})

alert("Absen berhasil")

}

</script>

</body>
</html>
