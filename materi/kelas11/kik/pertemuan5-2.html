        .nav-item:hover, .nav-item.active {

        .main-content {
            flex-grow: 1;
            margin-left: var(--sidebar-width);
            padding: 25px;
            width: 100%;
        }

        /* TOPBAR */
        .topbar {
            background: var(--white);
            padding: 15px 30px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        /* AREA SLIDE */
        .slide-container {
            background: var(--white);
            max-width: 950px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            text-align: center;
        }

        .page-indicator {
            background: #f8f9fa;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            color: var(--gold);
            margin-bottom: 15px;
            font-size: 14px;

            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn-slide {
            padding: 12px 25px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            font-size: 16px;
        }

        .btn-prev { background: #6c757d; color: white; }
        .btn-next { background: var(--gold); color: white; }
        .btn-slide:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        /* RESPONSIVE */
        .menu-toggle { display: none; font-size: 28px; cursor: pointer; color: var(--gold); }

        @media (max-width: 768px) {

            .sidebar.active { left: 0; }
            .main-content { margin-left: 0; padding: 15px; }
