    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #b8860b;
            --white: #ffffff;
            --bg-light: #f4f4f4;
            --text-dark: #333;
            --success: #28a745;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body { background-color: var(--bg-light); display: flex; min-height: 100vh; color: var(--text-dark); flex-direction: column; }

        /* --- SIDEBAR EMAS SAMPING --- */
        .sidebar { 
            width: 250px; background: var(--white); height: 100vh; position: fixed; 
            border-right: 2px solid #eee; transition: 0.3s; z-index: 1100; left: -250px; 
            display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        
        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 2px solid #f9f9f9; }
        .sidebar-header img { width: 60px; margin-bottom: 10px; }
        .sidebar-header h3 { font-size: 20px; color: var(--gold); font-weight: 800; }

        .nav-menu { padding: 20px 0; flex-grow: 1; }
        .nav-item {
            display: flex; align-items: center; padding: 15px 25px; color: #555;
            text-decoration: none; transition: 0.3s; font-size: 16px; font-weight: 500;
        }
        .nav-item i { width: 25px; margin-right: 15px; text-align: center; font-size: 18px; }
        .nav-item:hover, .nav-item.active { background: #fffcf0; color: var(--gold); border-left: 5px solid var(--gold); }

        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: var(--gold); display: none; }

        /* --- MAIN CONTENT --- */
        .main-content { flex-grow: 1; padding: 30px; transition: 0.3s; width: 100%; display: flex; flex-direction: column; align-items: center; }

        /* Container Slide dengan Garis Emas */
        .slide-container {
            max-width: 950px; width: 100%; background: var(--white); border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-top: 8px solid var(--gold);
            padding: 30px; text-align: center; margin-bottom: 20px;
        }

        .page-indicator {
            background: #e6ffed; display: inline-block; padding: 8px 20px;
            border-radius: 20px; font-weight: bold; color: var(--success);
            margin-bottom: 20px; font-size: 14px; border: 1px solid #c3e6cb;
        }

        h2 { color: var(--text-dark); margin-bottom: 25px; font-size: 24px; font-weight: 700; }

        .materi-img {
            width: 100%; height: auto; border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08); margin-bottom: 30px;
            border: 1px solid #eee;
        }

        /* NAVIGASI TOMBOL */
        .nav-buttons { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 10px; }

        .btn-slide {
            padding: 12px 25px; border-radius: 8px; text-decoration: none;
            font-weight: bold; display: flex; align-items: center; gap: 10px;
            transition: 0.3s; font-size: 15px;
        }

        .btn-prev { background: #555; color: white; }
        .btn-finish { background: var(--gold); color: white; }
        .btn-slide:hover { transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,0,0,0.15); opacity: 0.9; }

        /* FOOTER */
        .footer { text-align: center; padding: 20px; color: #888; font-size: 12px; margin-top: auto; }

        /* TOGGLE MOBILE */
        .menu-toggle { background: var(--gold); color: white; padding: 8px 12px; border-radius: 5px; cursor: pointer; position: fixed; top: 15px; left: 15px; z-index: 1000; }

        @media (min-width: 769px) {
            .sidebar { left: 0; }
            .menu-toggle { display: none; }
            .main-content { margin-left: 250px; }
        }

        @media (max-width: 768px) {
            .main-content { padding: 15px; padding-top: 70px; }
            .close-btn { display: block; }
            .btn-slide { width: 100%; justify-content: center; }
            h2 { font-size: 20px; }
        }
    </style>
</head>

        <div class="footer">
            ©2026 Developed by Helmi Yunar

    </div>

        }

</body>
