<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LKPD Kelas XI - Helmi Yunar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #D4AF37;
            --primary-green: #2e7d32;
            --dark-green: #1b5e20;
            --white: #ffffff;
            --bg-soft: #f4f7f6;
            --sidebar-width: 280px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body { background-color: var(--bg-soft); display: flex; min-height: 100vh; color: #333; }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-width); background: var(--white); height: 100vh;
            position: fixed; border-right: 1px solid #ddd; transition: 0.3s;
            z-index: 1000; display: flex; flex-direction: column;
        }
        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 2px solid #f9f9f9; }
        .sidebar-header img { width: 65px; margin-bottom: 10px; }
        .sidebar-header h3 { font-size: 20px; color: var(--gold); font-weight: 800; }

        .nav-menu { padding: 20px 0; flex-grow: 1; }
        .nav-item {
            display: flex; align-items: center; padding: 15px 25px;
            color: #444; text-decoration: none; font-weight: 600; transition: 0.3s;
        }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }
        .nav-item:hover, .nav-item.active { background: #fffcf0; color: var(--gold); border-left: 5px solid var(--gold); }

        /* MAIN CONTENT */
        .main-content { flex-grow: 1; margin-left: var(--sidebar-width); padding: 25px; width: 100%; }

        .topbar {
            background: var(--white); padding: 15px 30px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px;
        }

        /* HEADER SECTION */
        .header-section { text-align: center; margin-bottom: 40px; }
        .header-section h2 { font-size: 28px; color: var(--dark-green); font-weight: 800; }
        .header-section span { color: var(--gold); font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

        /* LIST CONTAINER */
        .list-container { max-width: 700px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }

        .pertemuan-card {
            background: var(--white);
            padding: 20px 25px;
            border-radius: 15px;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #eee;
            transition: 0.3s;
        }

        .pertemuan-card:hover {
            transform: translateX(10px);
            border-color: var(--gold);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .card-info { display: flex; align-items: center; gap: 20px; }
        .icon-box {
            width: 50px; height: 50px; background: #fff8e1; 
            border-radius: 12px; display: flex; align-items: center; 
            justify-content: center; color: var(--gold); font-size: 20px;
        }

        .pertemuan-card h4 { font-size: 18px; color: #444; }
        .pertemuan-card p { font-size: 13px; color: #999; }
        .arrow-icon { color: #ccc; transition: 0.3s; }
        .pertemuan-card:hover .arrow-icon { color: var(--gold); transform: translateX(5px); }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar { left: -100%; }
            .sidebar.active { left: 0; }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Logo_SMK.png" alt="Logo">
            <h3>LMS TKJ</h3>
        </div>
        <div class="nav-menu">
            <a href="/index.html" class="nav-item"><i class="fas fa-home"></i> Beranda</a>
            <a href="/materi/index.html" class="nav-item"><i class="fas fa-book"></i> Materi</a>
            <a href="/menu-utama-TKJ/tryout.html" class="nav-item"><i class="fas fa-edit"></i> Tryout</a>
            <a href="/lkpd/index.html" class="nav-item active"><i class="fas fa-file-alt"></i> LKPD</a>
            <a href="/absen/index.html" class="nav-item"><i class="fas fa-camera"></i> Absen</a>
            <a href="/tryout-tkj-XII-2026/ranking_minggu2.html" class="nav-item"><i class="fas fa-award"></i> Ranking</a>
        </div>
    </nav>

    <div class="main-content">
        <div class="topbar">
            <div style="font-weight: 800; color: var(--gold); cursor:pointer;" onclick="toggleSidebar()">
                <i class="fas fa-bars" style="margin-right: 10px;"></i> SMKN 7 LUWU
            </div>
            <div style="font-size: 14px; font-weight: 600;">LKPD Kelas XI</div>
        </div>

        <div class="header-section">
            <span>Daftar Lembar Kerja</span>
            <h2>📘 LKPD Kelas XI TKJ</h2>
        </div>

        <div class="list-container">
            <a href="p1.html" class="pertemuan-card">
                <div class="card-info">
                    <div class="icon-box"><i class="fas fa-tasks"></i></div>
                    <div>
                        <h4>Pertemuan 1</h4>
                        <p>Teknik Jaringan & Komunikasi</p>
                    </div>
                </div>
                <i class="fas fa-chevron-right arrow-icon"></i>
            </a>

            <a href="p2.html" class="pertemuan-card">
                <div class="card-info">
                    <div class="icon-box"><i class="fas fa-tasks"></i></div>
                    <div>
                        <h4>Pertemuan 2</h4>
                        <p>Manajemen Jaringan Lanjutan</p>
                    </div>
                </div>
                <i class="fas fa-chevron-right arrow-icon"></i>
            </a>

            <a href="kelas11/p3.html" class="pertemuan-card">
                <div class="card-info">
                    <div class="icon-box"><i class="fas fa-tasks"></i></div>
                    <div>
                        <h4>Pertemuan 3</h4>
                        <p>Proyek Kewirausahaan (KIK)</p>
                    </div>
                </div>
                <i class="fas fa-chevron-right arrow-icon"></i>
            </a>
            
            <div style="margin-top: 20px; text-align: center;">
                <a href="index.html" style="color: #888; text-decoration: none; font-size: 14px; font-weight: 600;">
                    <i class="fas fa-arrow-left"></i> Kembali Pilih Kelas
                </a>
            </div>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }
    </script>
</body>
</html>
