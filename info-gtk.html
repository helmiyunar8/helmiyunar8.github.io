<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsip Info GTK - SMKN 7 LUWU</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #b8860b; --white: #ffffff; --bg: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; display: flex; }

        /* --- SIDEBAR --- */
        .sidebar { width: 250px; background: var(--white); height: 100vh; position: fixed; border-right: 2px solid #eee; transition: 0.3s; z-index: 1000; }
        .nav-menu { padding: 20px; margin-top: 50px; }
        .nav-item { display: block; padding: 12px 15px; color: #555; text-decoration: none; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; font-size: 15px; }
        .nav-item:hover, .nav-item.active { background: var(--gold); color: white; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: var(--gold); display: none; }

        /* --- KONTEN --- */
        .main-content { flex: 1; margin-left: 250px; padding: 30px; transition: 0.3s; }
        .container { max-width: 800px; margin: auto; background: var(--white); border-radius: 12px; border-top: 8px solid var(--gold); padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        /* --- LOGIN BOX --- */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-box { background: white; padding: 40px; border-radius: 15px; text-align: center; border-bottom: 5px solid var(--gold); width: 300px; }
        .login-box input { padding: 12px; width: 100%; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; text-align: center; font-size: 16px; box-sizing: border-box; }
        .btn-login { background: var(--gold); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }

        /* --- SEARCH & ACCORDION --- */
        .search-box { width: 100%; padding: 15px; margin-bottom: 25px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline-color: var(--gold); }
        .item-guru { margin-bottom: 10px; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
        .header-guru { background: #fffdf0; padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; color: #444; }
        .header-guru:hover { background: #fdf5d2; }
        .content-guru { display: none; padding: 15px; background: white; border-top: 1px solid #eee; }
        .item-guru.active .content-guru { display: block; }
        .item-guru.active .header-guru { background: var(--gold); color: white; }

        /* --- FILE LIST --- */
        .file-list { display: flex; flex-direction: column; gap: 8px; }
        .file-link { display: flex; justify-content: space-between; align-items: center; background: #f9f9f9; padding: 10px 15px; border-radius: 6px; text-decoration: none; color: #333; font-size: 14px; border: 1px solid #eee; transition: 0.2s; }
        .file-link:hover { border-color: var(--gold); color: var(--gold); }

        .menu-toggle { display: none; position: fixed; top: 15px; left: 15px; background: var(--gold); color: white; padding: 10px; border-radius: 5px; cursor: pointer; z-index: 1100; }

        @media (max-width: 768px) {
            .sidebar { left: -250px; }
            .sidebar.active { left: 0; }
            .main-content { margin-left: 0; padding: 15px; margin-top: 60px; }
            .menu-toggle { display: block; }
            .close-btn { display: block; }
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <i class="fas fa-user-shield" style="font-size: 50px; color: var(--gold); margin-bottom: 20px;"></i>
            <h3 style="margin-top:0;">LOGIN INFO GTK</h3>
            <input type="password" id="passInput" placeholder="Password Akses">
            <button class="btn-login" onclick="checkPass()">MASUK</button>
            <p id="pesan-salah" style="color: red; display: none; font-size: 13px; margin-top: 15px;">Akses Ditolak!</p>
        </div>
    </div>

    <div class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i> Menu</div>
    
    <div class="sidebar" id="mySidebar">
        <div class="close-btn" onclick="toggleMenu()">&times;</div>
        <div class="nav-menu">
            <a href="index.html" class="nav-item"><i class="fas fa-home"></i> Beranda</a>
            <a href="arsip.html" class="nav-item active"><i class="fas fa-archive"></i> ARSIP</a>
        </div>
    </div>

    <div class="main-content">
        <div class="container">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="color:var(--gold); margin:0;"><i class="fas fa-address-card"></i> INFO GTK VALID</h2>
                <a href="arsip.html" style="text-decoration:none; color:var(--gold); font-weight:bold;">← KEMBALI</a>
            </div>

            <input type="text" class="search-box" id="search" placeholder="Ketik Nama Anda..." onkeyup="filterNama()">

            <div id="listGuruContainer">
                </div>
        </div>
    </div>

    <script>
        // --- 1. DATABASE GURU (Cukup edit di sini saja) ---
        const dataGuru = [
            { 
                nama: "Helmi Yunar", 
                berkas: [
                    { tgl: "Validasi Jan 2026", file: "helmi_jan_26.pdf" },
                    { tgl: "Validasi Feb 2026", file: "helmi_feb_26.pdf" }
                ]
            },
            { 
                nama: "Sitti Asliani Agussalim", 
                berkas: [
                    { tgl: "Validasi Feb 2026", file: "ani_mar_26.pdf" }
                    { tgl: "Validasi Maret 2026", file: "ani_mar_26.pdf" }
                ]
            }
        ];

        // --- 2. LOGIN LOGIC ---
        function checkPass() {
            const pass = document.getElementById("passInput").value;
            if(pass === "punyahyr") {
                document.getElementById("login-overlay").style.display = "none";
                tampilkanData();
            } else {
                document.getElementById("pesan-salah").style.display = "block";
            }
        }

        // --- 3. DISPLAY DATA ---
        function tampilkanData() {
            const container = document.getElementById("listGuruContainer");
            container.innerHTML = "";

            dataGuru.forEach((guru, index) => {
                const div = document.createElement("div");
                div.className = "item-guru";
                
                let fileHTML = "";
                guru.berkas.forEach(b => {
                    const linkViewer = `https://docs.google.com/viewer?url=https://helmiyunar8.github.io/data-gtk/${b.file}&embedded=true`;
                    fileHTML += `
                        <a href="${linkViewer}" target="_blank" class="file-link">
                            <span><i class="far fa-file-pdf"></i> ${b.tgl}</span>
                            <i class="fas fa-external-link-alt" style="font-size:12px;"></i>
                        </a>`;
                });

                div.innerHTML = `
                    <div class="header-guru" onclick="this.parentElement.classList.toggle('active')">
                        <span>${guru.nama}</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="content-guru">
                        <div class="file-list">${fileHTML}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // --- 4. FILTER CARI ---
        function filterNama() {
            const input = document.getElementById("search").value.toUpperCase();
            const items = document.getElementsByClassName("item-guru");
            for (let i = 0; i < items.length; i++) {
                let txt = items[i].querySelector(".header-guru span").textContent;
                items[i].style.display = txt.toUpperCase().indexOf(input) > -1 ? "" : "none";
            }
        }

        function toggleMenu() { document.getElementById("mySidebar").classList.toggle("active"); }
    </script>
</body>
</html>
